# Coolify-friendly compose — exposes the container to Traefik without
# binding ports on the host. Use `docker compose up` for local-only runs.
services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
    image: pillar-and-pearl:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      # Coolify auto-injects its Traefik labels; uncomment for bare Traefik:
      # - traefik.enable=true
      # - traefik.http.routers.pillarpearl.rule=Host(`pillarpearl.com`) || Host(`www.pillarpearl.com`)
      # - traefik.http.routers.pillarpearl.entrypoints=websecure
      # - traefik.http.routers.pillarpearl.tls=true
      # - traefik.http.routers.pillarpearl.tls.certresolver=cloudflare
      # - traefik.http.services.pillarpearl.loadbalancer.server.port=3000
      - org.pillarpearl.service=web
