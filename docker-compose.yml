services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
    image: pillar-and-pearl:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/products"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      # Coolify usually injects Traefik labels automatically.
      # Uncomment for bare-metal Traefik (without Coolify):
      # - traefik.enable=true
      # - traefik.http.routers.pillarpearl.rule=Host(`pillarpearl.com`) || Host(`www.pillarpearl.com`)
      # - traefik.http.routers.pillarpearl.entrypoints=websecure
      # - traefik.http.routers.pillarpearl.tls=true
      # - traefik.http.routers.pillarpearl.tls.certresolver=letsencrypt
      # - traefik.http.services.pillarpearl.loadbalancer.server.port=3000
      - org.pillarpearl.service=web
