# Coolify-friendly compose — web + scraper worker share an SQLite volume.
services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
    image: pillar-and-pearl:latest
    restart: unless-stopped
    environment:
      ROLE: web
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
      PILLARPEARL_DB: /data/pillarpearl.db
      PILLARPEARL_IMAGE_DIR: /data/images
    volumes:
      - pillarpearl_data:/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - org.pillarpearl.service=web

  worker:
    image: pillar-and-pearl:latest
    restart: unless-stopped
    depends_on:
      - web
    environment:
      ROLE: worker
      NODE_ENV: production
      PILLARPEARL_DB: /data/pillarpearl.db
      PILLARPEARL_IMAGE_DIR: /data/images
      PILLARPEARL_CRON: ${PILLARPEARL_CRON:-0 * * * *}
    volumes:
      - pillarpearl_data:/data
    labels:
      - org.pillarpearl.service=worker

volumes:
  pillarpearl_data:
    name: pillarpearl_data
