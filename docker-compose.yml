# Coolify-friendly compose — web + scraper worker share an SQLite volume.
# Container names + the external `coolify` network are pinned so the existing
# Traefik dynamic file (/data/coolify/proxy/dynamic/pillarpearl.com.yml) can
# keep routing to `pillarpearl-web:3000` without changes.
services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
    image: pillar-and-pearl:latest
    container_name: pillarpearl-web
    restart: unless-stopped
    networks:
      - coolify
    environment:
      ROLE: web
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pillarpearl.com}
      PILLARPEARL_DB: /data/pillarpearl.db
      PILLARPEARL_IMAGE_DIR: /data/images
      PILLARPEARL_ADMIN_TOKEN: ${PILLARPEARL_ADMIN_TOKEN:-}
    volumes:
      - pillarpearl_data:/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - org.pillarpearl.service=web

  worker:
    image: pillar-and-pearl:latest
    container_name: pillarpearl-worker
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - coolify
    environment:
      ROLE: worker
      NODE_ENV: production
      PILLARPEARL_DB: /data/pillarpearl.db
      PILLARPEARL_IMAGE_DIR: /data/images
      PILLARPEARL_CRON: ${PILLARPEARL_CRON:-0 * * * *}
    volumes:
      - pillarpearl_data:/data
    healthcheck:
      disable: true
    labels:
      - org.pillarpearl.service=worker

networks:
  coolify:
    external: true
    name: coolify

volumes:
  pillarpearl_data:
    name: pillarpearl_data
